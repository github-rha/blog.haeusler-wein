<!DOCTYPE html>
<html lang="{{ site.lang | default: 'de' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} – {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}">
</head>
<body>
    <header>
        <nav>
            <a href="{{ '/' | relative_url }}" class="logo">{{ site.title }}</a>
            <a href="https://haeusler-wein.ch/" class="back-link">← Häusler Wein</a>
        </nav>
    </header>

    <main>
        {{ content }}
    </main>

    <footer>
        <p>&copy; {{ 'now' | date: '%Y' }} Häusler Wein – <a href="https://haeusler-wein.ch/#rechtliches">Rechtliches</a></p>
    </footer>
</body>
</html>
